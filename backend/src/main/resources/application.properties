spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/paf_loja?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=4421
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:5500
app.session.cleanup-initial-delay-ms=60000
app.session.cleanup-interval-ms=900000
